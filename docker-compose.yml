version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zappay-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_URL: ${DB_URL}
      PRIVY_APP_ID: ${PRIVY_APP_ID}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET}
      AVNU_API_KEY: ${AVNU_API_KEY}
      AVNU_PAYMASTER_URL: ${AVNU_PAYMASTER_URL}
    networks:
      - dokploy-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PRIVY_APP_ID: ${VITE_PRIVY_APP_ID}
        VITE_PAYMENT_ROUTER_ADDRESS: ${VITE_PAYMENT_ROUTER_ADDRESS}
    container_name: zappay-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
